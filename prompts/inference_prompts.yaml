# --- Feedback Prompts ---
feedback:
  too_small_bbox: "The bounding box you selected was too small, resulting in an unprocessable image. You MUST select a larger region. Review the previous images and provide a new, larger bounding box."
  tool_success: "Tool '{tool_name}' returned:\n{result}\n\nContinue your reasoning based on this information."
  tool_error: "Error executing tool '{tool_name}': {error}\n\nPlease try a different approach."

# --- Turn Templates ---
turn_templates:
  # For local greedy inference with built-in vision tokens
  local_greedy:
    tool_call_crop_multi_turn: "After the above Action {action_turn}, here is the the zoom-in image (Observation {observation_turn}):\n[Image: observation_{observation_turn}] <|vision_start|><|image_pad|><|vision_end|>.\nContinue your reasoning process. If needed, you can continue to zoom in, by outputting <grounding> and </grounding> as before. If the final answer is confirmed, you MUST put your final answer inside <answer> and </answer> tags."
    initial_user_prompt: "[Image: original_image] <|vision_start|><|image_pad|><|vision_end|>\n{question}"

  # For API and local TTS inference with image placeholders
  placeholder_based:
    tool_call_crop_multi_turn: "After the above Action {action_turn}, here is the the zoom-in image (Observation {observation_turn}):\n{image_placeholder}.\nContinue your reasoning process. If needed, you can continue to zoom in, by outputting <grounding> and </grounding> as before. If the final answer is confirmed, you MUST put your final answer inside <answer> and </answer> tags."
    initial_user_prompt: "{image_placeholder}\n{question}"


  # zoom_0_1_scale: |
  #   You are a helpful assistant. Answer the user's question based on the image provided. Output your thinking process within the <think> and </think> tags. Whenever you find anything unclear, you can zoom in a specific region in the given image to see more clearly by outputing <grounding>{"bbox_2d": [x0, y0, x1, y1], "source": "original_image"}</grounding>, where (x0, y0) and (x1, y1) are the top-left and bottom-right coordinates of the region that you want to zoom in, respectively (suppose the width and height of the image are 1.0), and 'source' refers to the image that you zoom in and could be either 'original_image' or 'observation_i'. Once the final answer is confirmed, put it within <answer> and </answer>.
